name: Lima-VM Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Garden Linux version to build, for example '1443.1'
        required: true

jobs:
  cname:
    runs-on: ubuntu-latest
    outputs:
      CNAME: ${{ steps.cname.outputs.CNAME }}
    steps:
      - uses: actions/checkout@v4
      - id: cname
        run: |
          CNAME=$(podman run -t --rm --volume=$PWD:/gl ghcr.io/gardenlinux/builder:3ab2bb52bc46bb200c761369c087e9413d1ce0ac /builder/parse_features --feature-dir /gl/features --features kvm,lima,_curl cname_base | head -n1)
          echo "CNAME=$CNAME" >> "$GITHUB_OUTPUT"
  build:
    runs-on: ubuntu-latest
    needs: cname
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      # Workaround for crun version, cf https://github.com/gardenlinux/gardenlinux/pull/1982
      - uses: ./.github/actions/setup
      # todo: version
      - name: Build the image
        run: ./build format('{0}-{1}', ${{ needs.cname.outputs.CNAME }}, ${{ matrix.arch }})
      - uses: actions/upload-artifact@v4
        with:
          name: format('{0}-{1}', ${{ needs.cname.outputs.CNAME }}, ${{ matrix.arch }})
          path: .build/format('{0}-{1}', ${{ needs.cname.outputs.CNAME }}, ${{ matrix.arch }})*qcow2
      - uses: actions/upload-artifact@v4
        with:
          name: format('{0}-{1}', ${{ needs.cname.outputs.CNAME }}, ${{ matrix.arch }})-yaml
          path: .build/format('{0}-{1}', ${{ needs.cname.outputs.CNAME }}, ${{ matrix.arch }})*yaml

  lima-manifest:
    runs-on: ubuntu-latest
    needs:
      - cname
      - build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.cname.outputs.CNAME }}-amd64-yaml
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.cname.outputs.CNAME }}-arm64-yaml
      - run: mv kvm*amd*yaml kvm-amd64.yaml
      - run: mv kvm*arm*yaml kvm-arm64.yaml
      - run: |
          from pathlib import Path

          template = """# Lima file for Garden Linux
          # See https://gardenlinux.io/ for infos on Garden Linux
          # See https://lima-vm.io/ for infos on Lima

          # To create a new vm, run:
          #  limactl create --name=gardenlinux-today https://images.gardenlinux.io/__BUILDER_CNAME__-__BUILDER_COMMIT__.yaml

          vmType: qemu
          os: Linux
          images:
          __IMAGE__AMD__
          __IMAGE__ARM__

          containerd:
            system: false
            user: false
          """

          manifest = template\
            .replace("__IMAGE__AMD__", Path("kvm-amd64.yaml").read_text())\
            .replace("__IMAGE__ARM__", Path("kvm-arm64.yaml").read_text())

          with open("lima.yaml", "w+") as file:
            file.write(manifest)

        shell: python

      - uses: actions/upload-artifact@v4
        with:
          name: lima-manifest-${{ inputs.version }}
          path: lima.yaml
