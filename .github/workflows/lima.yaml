name: Lima-VM Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Garden Linux version to build, for example '1443.1' or 'main'. Use 'main' instead of 'today'.
        required: true

jobs:
  cname:
    runs-on: ubuntu-latest
    outputs:
      CNAME: ${{ steps.cname.outputs.CNAME }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: gardenlinux
      - uses: actions/checkout@v4
        with:
          repository: 'gardenlinux/builder'
          path: builder
      - run: sudo apt-get -y install python3 python3-mako python3-networkx python3-pefile python3-yaml
      - id: cname
        run: |
          CNAME=$(python builder/builder/parse_features --feature-dir gardenlinux/features --features kvm,lima,_curl cname_base)
          echo "CNAME=$CNAME" >> "$GITHUB_OUTPUT"
  build:
    runs-on: ubuntu-latest
    needs: cname
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      # Workaround for crun version, cf https://github.com/gardenlinux/gardenlinux/pull/1982
      - uses: ./.github/actions/setup
      - name: Build the image
        run: ./build ${{ needs.cname.outputs.CNAME }}-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.cname.outputs.CNAME }}-${{ matrix.arch }}
          path: .build/${{ needs.cname.outputs.CNAME }}-${{ matrix.arch }}*qcow2
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.cname.outputs.CNAME }}-${{ matrix.arch }}-yaml
          path: .build/${{ needs.cname.outputs.CNAME }}-${{ matrix.arch }}*yaml

  lima-manifest:
    runs-on: ubuntu-latest
    needs:
      - cname
      - build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.cname.outputs.CNAME }}-amd64-yaml
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.cname.outputs.CNAME }}-arm64-yaml
      - id: commit
        run: echo "COMMITID=$(git rev-parse HEAD 2> /dev/null)" >> "$GITHUB_OUTPUT"
      - run: |
          from pathlib import Path
          import os

          template = """# Lima file for Garden Linux
          # See https://gardenlinux.io/ for infos on Garden Linux
          # See https://lima-vm.io/ for infos on Lima

          # To create a new vm, run one of the following based on your desired architecture:
          #  limactl create --name=gardenlinux-today https://images.gardenlinux.io/${{ needs.cname.outputs.CNAME }}-amd64-${{ inputs.version == 'main' && 'today' ||  inputs.version }}-${{ steps.commit.outputs.COMMITID }}.yaml
          #  limactl create --name=gardenlinux-today https://images.gardenlinux.io/${{ needs.cname.outputs.CNAME }}-arm64-${{ inputs.version == 'main' && 'today' ||  inputs.version }}-${{ steps.commit.outputs.COMMITID }}.yaml

          vmType: qemu
          os: Linux
          images:
          __IMAGE__AMD__
          __IMAGE__ARM__

          containerd:
            system: false
            user: false
          """

          manifest = template\
            .replace("__IMAGE__AMD__", Path(os.environ["AMD_YAML_FILENAME"]).read_text())\
            .replace("__IMAGE__ARM__", Path(os.environ["ARM_YAML_FILENAME"]).read_text())

          with open(os.environ["OUTPUT_YAML_FILENAME"], "w+") as file:
            file.write(manifest)

        shell: python
        env:
          AMD_YAML_FILENAME: ${{ needs.cname.outputs.CNAME }}-amd64-${{ inputs.version == 'main' && 'today' ||  inputs.version }}-${{ steps.commit.outputs.COMMITID }}.yaml
          ARM_YAML_FILENAME: ${{ needs.cname.outputs.CNAME }}-arm64-${{ inputs.version == 'main' && 'today' ||  inputs.version }}-${{ steps.commit.outputs.COMMITID }}.yaml
          OUTPUT_YAML_FILENAME: ${{ needs.cname.outputs.CNAME }}-${{ inputs.version == 'main' && 'today' ||  inputs.version }}-${{ steps.commit.outputs.COMMITID }}.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: lima-manifest-${{ needs.cname.outputs.CNAME }}-${{ inputs.version == 'main' && 'today' ||  inputs.version }}-${{ steps.commit.outputs.COMMITID }}.yaml
          path: ${{ needs.cname.outputs.CNAME }}-${{ inputs.version == 'main' && 'today' ||  inputs.version }}-${{ steps.commit.outputs.COMMITID }}.yaml
